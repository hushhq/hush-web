<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#F0EEE9" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Void black page background -->
  <rect width="1200" height="630" fill="#000000"/>

  <!-- Subtle warm ambient glow (mirrors global.css body::before) -->
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- || logo mark — proportions from src/components/brand/HushLogo.jsx
       Bar height = 112 (scale factor 2 from 56-unit original).
       Horizontal center = 600. Total span = 60px. -->
  <rect x="570" y="208" width="20" height="112" fill="#F0EEE9"/>
  <rect x="610" y="208" width="20" height="112" fill="#F0EEE9"/>

  <!-- Brand name -->
  <text
    x="600" y="390"
    text-anchor="middle"
    font-family="'-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', sans-serif"
    font-size="72"
    font-weight="400"
    letter-spacing="-0.02em"
    fill="#F0EEE9">Hush</text>

  <!-- Tagline (matches index.html <title>) -->
  <text
    x="600" y="440"
    text-anchor="middle"
    font-family="'-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', sans-serif"
    font-size="24"
    font-weight="300"
    fill="rgba(255,255,255,0.60)">Your server. Nobody else's.</text>

  <!-- URL footer -->
  <text
    x="600" y="560"
    text-anchor="middle"
    font-family="'SF Mono', 'Monaco', 'Inconsolata', 'Roboto Mono', 'Courier New', monospace"
    font-size="15"
    letter-spacing="0.09em"
    fill="rgba(255,255,255,0.40)">gethush.live</text>
</svg>
