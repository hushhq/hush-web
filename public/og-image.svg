<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Warm background radial (hero-style) -->
    <radialGradient id="warmBg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#261c1c" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- Dot glow (dusty rose) -->
    <radialGradient id="dotGlow" cx="570" cy="178" r="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D8C0B8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#D8C0B8" stop-opacity="0"/>
    </radialGradient>
    <!-- Hero gradient for "architecture" text -->
    <linearGradient id="archGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#D0C4D8"/>
      <stop offset="30%"  stop-color="#D8C0B8"/>
      <stop offset="60%"  stop-color="#E0D4C0"/>
      <stop offset="100%" stop-color="#C0D0C4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#000000"/>
  <rect width="1200" height="630" fill="url(#warmBg)"/>

  <!-- Eyebrow -->
  <text x="600" y="155" text-anchor="middle"
        font-family="'Geist Mono', monospace" font-size="11"
        letter-spacing="0.1em" fill="#5b5a57">
    OPEN SOURCE  ·  AGPL-3.0  ·  SELF-HOSTABLE
  </text>

  <!-- Dot glow + dot (above the 'u') -->
  <circle cx="570" cy="178" r="30" fill="url(#dotGlow)"/>
  <circle cx="570" cy="178" r="8" fill="#D8C0B8"/>

  <!-- Wordmark "hush" -->
  <text x="600" y="260" text-anchor="middle"
        font-family="'Sharphy Medium', sans-serif" font-size="120" font-weight="500"
        fill="#EEEEF0">hush</text>

  <!-- Headline: "Private by" in mauve white, "architecture." in gradient -->
  <text y="345" text-anchor="middle"
        font-family="'Geist ExtraLight', sans-serif" font-size="40" font-weight="200"
        letter-spacing="-0.03em">
    <tspan x="520" fill="#EEEEF0">Private by </tspan>
    <tspan fill="url(#archGrad)">architecture.</tspan>
  </text>

  <!-- Subtitle line 1 -->
  <text x="600" y="415" text-anchor="middle"
        font-family="'Geist Light', sans-serif" font-size="16" font-weight="300"
        fill="#84827e">End-to-end encrypted voice, video, screen and chat.</text>

  <!-- Subtitle line 2 -->
  <text x="600" y="440" text-anchor="middle"
        font-family="'Geist Light', sans-serif" font-size="16" font-weight="300"
        fill="#a09e98">No email. No password.</text>

  <!-- URL -->
  <text x="600" y="565" text-anchor="middle"
        font-family="'Geist Mono', monospace" font-size="13"
        letter-spacing="0.07em" fill="#5b5a57">gethush.live</text>
</svg>