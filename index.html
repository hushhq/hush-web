<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Hush — Your server. Nobody else's.</title>
  <meta name="description" content="Private screen sharing. No limits, no tracking, no bullshit." />
  <!-- Favicon and apple-touch-icon: set from system preference for first paint, then kept in sync by app (FaviconThemeSync) when data-theme is set -->
  <link rel="icon" type="image/png" href="/favicon.png?v=43a6f36-og2" id="favicon">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=43a6f36-og2" id="apple-touch-icon">
  <script>
    (function(){
      var dark = !window.matchMedia('(prefers-color-scheme: light)').matches;
      var f = document.getElementById('favicon'); var a = document.getElementById('apple-touch-icon');
      if (f) f.href = dark ? '/favicon.png?v=43a6f36-og2' : '/favicon-light.png?v=43a6f36-og2';
      if (a) a.href = dark ? '/apple-touch-icon.png?v=43a6f36-og2' : '/apple-touch-icon-light.png?v=43a6f36-og2';
    })();
  </script>
  <meta property="og:image" content="https://gethush.live/og-image.png?v=47a36b2-og2">
  <meta property="og:title" content="Hush — Your server. Nobody else's.">
  <meta property="og:description" content="High-quality screen sharing with no resolution caps. Open source, self-hostable.">
  <meta name="twitter:card" content="summary_large_image">
  <!-- Browser chrome color - pinned to --hush-surface so it never auto-drifts with page content -->
  <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#000000">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F0EEE9">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@200;300;400;500;600&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
